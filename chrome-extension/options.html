<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 320px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    padding: 20px;
  }
  h1 { font-size: 16px; margin-bottom: 16px; color: #fff; }
  label {
    display: block;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 4px;
  }
  input {
    width: 100%;
    padding: 8px;
    background: #111;
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    font-size: 13px;
    margin-bottom: 12px;
    font-family: monospace;
  }
  input:focus { outline: none; border-color: #6366f1; }
  .hint {
    font-size: 11px;
    color: #555;
    margin-top: -8px;
    margin-bottom: 12px;
  }
  button {
    width: 100%;
    padding: 10px;
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #5558e6; }
  .toast {
    margin-top: 10px;
    padding: 8px;
    border-radius: 6px;
    font-size: 12px;
    text-align: center;
    display: none;
    background: #052e16;
    color: #4ade80;
    border: 1px solid #166534;
  }
  .toast.show { display: block; }
</style>
</head>
<body>
  <h1>Dig This &mdash; Settings</h1>

  <label for="agentUrl">Agent URL</label>
  <input type="text" id="agentUrl" placeholder="https://chino-bandido.kadedworkin.com">
  <p class="hint">Your Dugg server or agent endpoint (with port if needed)</p>

  <label for="apiKey">API Key</label>
  <input type="text" id="apiKey" placeholder="dugg_2c7e...">
  <p class="hint">Your Dugg API key</p>

  <button id="saveBtn">Save</button>
  <div class="toast" id="toast">Settings saved</div>

  <script src="options.js"></script>
</body>
</html>
